server {
    listen 80;
    server_name combosalvauniversitario.site www.combosalvauniversitario.site;

    root /var/www/concursaflix;
    index index.html;

    # --- Checkout pages (static) ---
    location /checkout-mensal/ {
        try_files $uri $uri/ /checkout-mensal/index.html;
    }

    location /checkout-trimestral/ {
        try_files $uri $uri/ /checkout-trimestral/index.html;
    }

    location /checkout-semestral/ {
        try_files $uri $uri/ /checkout-semestral/index.html;
    }

    # --- Google verification ---
    location = /google18593b2a61774125.html {
        alias /var/www/concursaflix/index/google18593b2a61774125.html;
    }

    # --- Landing page (main site) ---
    # Root serves landing page
    location = / {
        try_files /index/index.html =404;
    }

    # Landing page internal assets (resolve ./relative paths from index.html)
    location /index/ {
        try_files $uri =404;
    }

    # Serve landing page _files folder (browser resolves ./Combo... relative to /)
    location ^~ "/Combo Salva" {
        root /var/www/concursaflix/index;
        try_files $uri =404;
    }

    # Landing page root-level assets (favicons, ttq-local.js)
    location = /favicon-16.png {
        try_files /index/favicon-16.png =404;
    }
    location = /favicon-32.png {
        try_files /index/favicon-32.png =404;
    }
    location = /favicon-salva-192.png {
        try_files /index/favicon-salva-192.png =404;
    }
    location = /ttq-local.js {
        try_files /index/ttq-local.js =404;
    }

    # --- Block sensitive directories ---
    location ~ /\. {
        deny all;
        return 404;
    }

    location /node_modules/ {
        deny all;
        return 404;
    }

    location /server/ {
        deny all;
        return 404;
    }

    location /src/ {
        deny all;
        return 404;
    }

    location /deploy/ {
        deny all;
        return 404;
    }

    location /scripts/ {
        deny all;
        return 404;
    }

    # --- Static asset caching ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Fallback ---
    location / {
        return 404;
    }
}
