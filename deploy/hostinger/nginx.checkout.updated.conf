server {
    server_name combosalvauniversitario.site www.combosalvauniversitario.site;

    # ── Security headers ──
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.combosalvauniversitario.site; frame-ancestors 'self';" always;

    root /var/www/concursaflix;
    index index.html;

    # --- Checkout pages (static) — sem cache para refletir mudanças instantaneamente ---
    location /checkout-mensal/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /checkout-mensal/index.html;
    }

    location /checkout-trimestral/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /checkout-trimestral/index.html;
    }

    location /checkout-semestral/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /checkout-semestral/index.html;
    }

    # --- Google verification ---
    location = /google18593b2a61774125.html {
        alias /var/www/concursaflix/index/google18593b2a61774125.html;
    }

    # --- Landing page (main site) ---
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index/index.html =404;
    }

    location /index/ {
        try_files $uri =404;
    }

    location ^~ "/Combo Salva" {
        root /var/www/concursaflix/index;
        try_files $uri =404;
    }

    location = /favicon-16.png {
        try_files /index/favicon-16.png =404;
    }
    location = /favicon-32.png {
        try_files /index/favicon-32.png =404;
    }
    location = /favicon-salva-192.png {
        try_files /index/favicon-salva-192.png =404;
    }
    location = /ttq-local.js {
        try_files /index/ttq-local.js =404;
    }

    # --- React SPA (painel admin) ---
    # HTML: nunca cachear para garantir atualizações instantâneas
    location = /app/index.html {
        alias /var/www/concursaflix/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Hashed assets do Vite (ex: index-DtI502f0.js) — cache longo é seguro
    location ~* ^/app/assets/.+\.[0-9a-f]{8,}\.(js|css)$ {
        alias /var/www/concursaflix/dist/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location /app/ {
        alias /var/www/concursaflix/dist/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /app/index.html;
    }

    # --- Block sensitive directories ---
    location ~ /\. {
        deny all;
        return 404;
    }

    location /node_modules/ {
        deny all;
        return 404;
    }

    location /server/ {
        deny all;
        return 404;
    }

    location /src/ {
        deny all;
        return 404;
    }

    location /deploy/ {
        deny all;
        return 404;
    }

    location /scripts/ {
        deny all;
        return 404;
    }

    # --- Static asset caching ---
    # Checkout CSS/JS: cache curto (podem mudar sem hash)
    location ~* /checkout-.+\.(css|js)$ {
        expires 15m;
        add_header Cache-Control "public, must-revalidate, max-age=900" always;
    }

    # Imagens e fontes: cache médio (raramente mudam)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # --- Fallback ---
    location / {
        return 404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/combosalvauniversitario.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/combosalvauniversitario.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.combosalvauniversitario.site) {
        return 301 https://$host$request_uri;
    }

    if ($host = combosalvauniversitario.site) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name combosalvauniversitario.site www.combosalvauniversitario.site;
    return 404;
}
